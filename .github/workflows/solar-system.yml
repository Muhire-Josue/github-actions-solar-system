name: Solar System Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feature/*"

jobs:
  unit-testing:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS Version
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Unit Testing
        run: npm test

      - name: Archive Test Result
        uses: actions/upload-artifact@v4
        with:
          name: Mocha-Test-Result
          path: test-results.xml
  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS Version - 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install Dependencies
        run: npm install

      - name: Check code coverage
        continue-on-error: true
        run: npm run coverage

      - name: Archive Test Result
        uses: actions/upload-artifact@v4
        with:
          name: Code-Coverage-Result
          path: coverage
          retention-days: 5
  docker:
    name: Containerize Application
    needs: [unit-testing, code-coverage]
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v2.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker build for testing
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-syste:${{ github.sha }}

      # - name: Docker Image testing
      #   run: |
      #     docker images
      #     docker run --name solar-system-app -d \
      #         -p 3000:3000 \
      #         -e MONGO_URI=$MONGO_URI \
      #         -e MONGO_USERNAME=$MONGO_USERNAME \
      #         -e MONGO_PASSWORD=$MONGO_PASSWORD \
      #         ${{ vars.DOCKERHUB_USERNAME }}/solar-syste:${{ github.sha }}
      #     export IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system-app)
      #     echo $IP
      #     echo Testing Image URL using wget
      #     wget -q -O - http://172.0.0.1:3000/live | grep live

      - name: Docker push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-syste:${{ github.sha }}

  dev-deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Install Kubectl cli
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.26.0'
      
      - name: Set kubeconfig file
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}
      
      - name: Fetch kubernetes cluster details
        run: |
          kubectl version --short
          echo ----------------------
          kubectl get nodes
      - name: Save Nginx Ingress Controller IP
        run: |
          echo "INGRESS_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}')" >> $GITHUB_ENV
      - name: Replace tokens in manifest files
        uses: cschleiden/replace-tokens@v1
        with:
          tokenPrefix: '_{_'
          tokenSuffix: '_}_'
          files: '["kubernetes/development/*.yaml"]' 
        env:
          NAMESPACE: ${{vars. NAMESPACE}}
          REPLICAS: ${{vars.REPLICAS}}
          IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/solar-syste:${{ github.sha }}
          INGRESS_IP: ${{env.INGRESS_IP}}
      - name: check files
        run: |
          cat kubernetes/development/*.yaml

      - name: Ensure namespace exists
        run: |
          kubectl get ns "${{ vars.NAMESPACE }}" >/dev/null 2>&1 || kubectl create ns "${{ vars.NAMESPACE }}"
      
      - name: Create/Update MongoDB secret
        run: |
          kubectl -n "${{ vars.NAMESPACE }}" create secret generic mongo-db-creds \
            --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
            --from-literal=MONGO_USERNAME="${{ secrets.MONGO_USERNAME }}" \
            --from-literal=MONGO_PASSWORD="${{ secrets.MONGO_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Dev Env
        run: |
          kubectl apply -f kubernetes/development